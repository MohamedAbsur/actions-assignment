name: Daily Commit

on:
  schedule:
    # Runs every day at 09:00 UTC (once per day, specific time as required)
    - cron: "0 9 * * *"
  workflow_dispatch: # Manual trigger for testing

jobs:
  daily-commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update file for 25ds1000041@ds.study.iitm.ac.in
        run: |
          echo "Last run: $(date -u)" >> daily-log.txt

      - name: Configure git
        run: |
          git config user.name "DevSync Bot"
          git config user.email "25ds1000041@ds.study.iitm.ac.in"

      - name: Commit changes
        run: |
          git add daily-log.txt
          git commit -m "Daily update: $(date -u) [skip ci]" || true


      - name: Push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push
